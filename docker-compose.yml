services:

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - ecoguard_network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecoguard_network

  redis:
    image: redis:7
    networks:
      - ecoguard_network

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - ecoguard_network

  beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - ecoguard_network

volumes:
  postgres_data:

networks:
  ecoguard_network:

